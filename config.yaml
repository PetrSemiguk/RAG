# RAG System Configuration
# Single source of truth for all hyperparameters.
# Loaded by RAGConfig.from_yaml("config.yaml").

llm:
  use_local: true
  lm_studio_url: "http://localhost:1234/v1"
  lm_studio_api_key: "lm-studio"
  temperature: 0.1
  openai_model: "gpt-3.5-turbo"

embedding:
  model: "BAAI/bge-base-en-v1.5"
  device: "auto"   # "auto" | "cuda" | "cpu"

chunking:
  strategy: "sentence"          # "sentence" | "semantic"
  chunk_size: 512
  chunk_overlap: 50
  semantic_breakpoint_percentile: 95   # only used when strategy = "semantic"

retrieval:
  strategy: "hybrid"            # "hybrid" | "vector"
  vector_top_k: 10
  bm25_top_k: 10
  rerank_top_n: 5

reranking:
  enabled: false
  type: "cross_encoder"         # "cross_encoder" | "cohere"
  cross_encoder_model: "cross-encoder/ms-marco-MiniLM-L-6-v2"

paths:
  data_dir: "data"
  db_path: "db"
  collection_name: "advanced_rag"
  results_dir: "results"
  logs_dir: "logs"

observability:
  sqlite_path: "logs/queries.db"
  log_level: "INFO"

experiment_tracking:
  backend: "json"               # "json" | "mlflow"
  mlflow_uri: "file:./mlruns"
